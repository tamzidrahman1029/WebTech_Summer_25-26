<!DOCTYPE html>
<html lang="en-Us">
    <head>
        <title> Login Form </title>
        <script src="../JavaScript/Script.js"></script>
    </head>

    <body>
        <h1> Login Form </h1>
        <div class="container">
        <fieldset>
            <legend> Submit </legend>
            
        <form onsubmit="return collect_data()">

            <table>
                <tr>
                    <td><label for="UserName"> UserName : </label></td>
                    <td><input type="text" id="UserName" name="UserName" placeholder="Enter your full name"></td>
                    <td><p id="NameError"></p></td>
                </tr>

                <tr>
                    <td><label for="Password"> Password :</label></td>
                    <td><input type="password" id="Password" name="Password" placeholder="Must be filled"></td>
                    <td><p id="PassError"></p></td>
                </tr>

            </table>
            </fieldset>

            <input type = "submit" id ="submit" name ="submit" value =SignUp>

        </form>
        </div>
    </body>


</html>
