<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title> Submit Page </title>
        <link rel="stylesheet" href="../Design/design.css">
    </head>
    <body>
        <fieldset> 
            <legend class="legend"> Student Information </legend>
        

        <form>
            <table>
                <tr>
                    <td><label for="Fname"> Full Name (Text)</label></td>
                    <br>
                    <td><label for="Email">    Email Address</label></td>

                    </tr>

                    <tr>
                    
                    <td><input type="text"id=Fname Full name (Text)="Fname" placeholder="Enter your full name"></td>
                
                
                    <td><input type="text"id=Email Email Address="Email" placeholder="your.email@example.com"></td>
                </tr>

                <tr>
                    <td><label for="Password"> Password </label></td>
                    <td><label for="Age"> Age Number </label></td>

                </tr>

                <tr>
                    <td><input type="text"id=Password Password="Password" placeholder="Enter secure Password"></td>
                    <td><input type="text"id=Age Age Number="Age" placeholder="Enter your age"></td>

                </tr>

                <tr>
                    <td><label for ="Edate"> Experiment Date </label> </td>
                    <td><label for ="phone"> Phone Number (Tell) </label> </td>
                    
                </tr>

                <tr>
                    <td><input type ="date" id ="Edate" name="Edate"></td>
                    <td><input type="text"id=phone Phone Number (Tell)="phone" placeholder="+880 XXXX XXXXX"></td>
                </tr>

            </table>

            </fieldset>

            <input class="xyz" type = "submit" id ="submit" name ="submit" value =Submit>
        <input class="clear" type = "reset" id ="reset" name ="reset" value ="Clear">

        </form>
    </body>
</html>
